# application.properties
spring.application.name=DreamZone

# MongoDB
spring.data.mongodb.uri=mongodb+srv://dreamzone:dreamzone123@dreamzone.r19nhcf.mongodb.net/?appName=DreamZone
spring.data.mongodb.database=dreamzone

# Thymeleaf
spring.thymeleaf.cache=false

# Subida de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8080

# Permite crear índices declarados con @Indexed automáticamente
spring.data.mongodb.auto-index-creation=true

# thymeleaf-extras-springsecurity6 trae spring-security al classpath de forma
# transitiva; sin un SecurityConfig propio esto bloquearía TODAS las rutas.
# Se excluyen las auto-configuraciones para que la app funcione sin Spring Security.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration