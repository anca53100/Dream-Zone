<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dream Zone - Recuperar Contraseña</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-screen active">
    <div class="auth-left">
        <div class="auth-brand">DREAM<span>ZONE</span></div>
        <div class="auth-left-copy">© DREAM ZONE 2025</div>
    </div>
    <div class="auth-right">
        <div class="auth-title">Recuperar Contraseña</div>
        <p style="font-size:13px;color:#666;text-align:center;margin-bottom:22px;line-height:1.6;">
            Ingresa tu correo registrado y te enviaremos un enlace para restablecer tu contraseña.
        </p>

        <form method="post" action="/forgot">
            <div class="f-group">
                <label class="f-label">Correo electrónico</label>
                <input class="f-input" type="email" name="email" placeholder="correo@ejemplo.com" required>
            </div>
            <button class="big-btn" type="submit">ENVIAR ENLACE</button>
        </form>
        <div class="auth-foot" style="margin-top:16px;"><a href="/login" class="lnk">← Volver al inicio de sesión</a></div>
    </div>
</div>
</body>
</html>
