<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Dream Zone</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="screen active">

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="/" class="brand">DREAM <span>ZONE</span></a>
    <div class="nav-links">
      <th:block th:each="cat : ${categorias}">
        <a th:href="@{'/?categoria=' + ${cat}}"
           class="nav-link"
           th:classappend="${activeCat == cat} ? 'active'"
           th:text="${cat}">
        </a>
      </th:block>
    </div>
    <div class="nav-icons">
      <!-- Búsqueda -->
      <form method="get" action="/" style="display:flex;align-items:center;">
        <button type="submit" class="nav-icon" title="Buscar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </form>
      <!-- Carrito -->
      <a th:href="${session.usuario != null} ? '#' : '/login'" class="nav-icon" title="Carrito">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <div class="cart-badge">0</div>
      </a>
      <!-- Perfil -->
      <th:block th:if="${session.usuario != null}">
        <a href="/logout" class="nav-icon" title="Cerrar sesión">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </a>
      </th:block>
      <th:block th:unless="${session.usuario != null}">
        <a href="/login" class="nav-icon" title="Iniciar sesión">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </a>
      </th:block>
    </div>
  </nav>

  <!-- BARRA DE BÚSQUEDA -->
  <div class="search-bar open" style="display:block;">
    <form method="get" action="/">
      <div class="search-inner">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" name="q" th:value="${busqueda}" placeholder="Buscar productos…">
        <a href="/"><button type="button">✕</button></a>
      </div>
    </form>
  </div>

  <main class="main">

    <!-- DESTACADOS -->
    <div th:if="${activeCat == 'Todos' and busqueda == null}">
      <div class="section-title">Destacado</div>
      <div class="carousel-outer">
        <button class="c-arrow prev" onclick="slide(-1)">‹</button>
        <div class="carousel-track" id="carousel">
          <th:block th:each="p : ${destacados}">
            <div class="p-card" style="min-width:calc(20% - 12px);flex-shrink:0;">
              <div class="p-img-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.3" width="42%" height="42%">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <path d="M21 15l-5-5L5 21"/>
                </svg>
                <div class="p-badge" th:if="${p.badge != null}" th:text="${p.badge}">NEW</div>
              </div>
              <div class="p-info">
                <div class="p-name" th:text="${p.nombre}">Nombre</div>
                <div class="p-cat"  th:text="${p.subcategoria}">Cat</div>
                <div class="p-bottom">
                  <div class="p-price" th:text="${p.precio}">$0</div>
                  <a th:href="${session.usuario != null} ? '#' : '/login'" class="p-cart-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                    </svg>
                  </a>
                </div>
              </div>
            </div>
          </th:block>
        </div>
        <button class="c-arrow next" onclick="slide(1)">›</button>
      </div>
    </div>

    <!-- GRILLA -->
    <div class="grid-header">
      <div class="section-title" style="margin-bottom:0"
           th:text="${busqueda != null} ? 'Resultados para ' + busqueda : (activeCat == 'Todos' ? 'Todos los productos' : activeCat)">
        Todos los productos
      </div>
      <a href="/" class="ver-todo-btn">VER TODO →</a>
    </div>

    <div class="products-grid">
      <th:block th:each="p : ${productos}">
        <div class="p-card">
          <div class="p-img-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.3" width="42%" height="42%">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <div class="p-badge" th:if="${p.badge != null}" th:text="${p.badge}">NEW</div>
          </div>
          <div class="p-info">
            <div class="p-name" th:text="${p.nombre}">Nombre</div>
            <div class="p-cat"  th:text="${p.subcategoria}">Cat</div>
            <div class="p-bottom">
              <div class="p-price" th:text="${p.precio}">$0</div>
              <a th:href="${session.usuario != null} ? '#' : '/login'" class="p-cart-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                  <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                  <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
              </a>
            </div>
          </div>
        </div>
      </th:block>
      <div class="empty" th:if="${#lists.isEmpty(productos)}">Sin resultados.</div>
    </div>

  </main>

  <footer class="footer">
    <div class="brand">DREAM <span>ZONE</span></div>
    <div class="footer-copy">© 2025 Dream Zone · Todos los derechos reservados</div>
    <div class="footer-icons">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#25d366">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
      </svg>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e1306c" stroke-width="2">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r=".5" fill="#e1306c"/>
      </svg>
    </div>
  </footer>
</div>

<script>
  function slide(dir){
    const t=document.getElementById('carousel');
    t.scrollLeft+=dir*((t.children[0]?.offsetWidth||0)+14);
  }
</script>
</body>
</html>
