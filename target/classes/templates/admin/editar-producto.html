<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto | Dream Zone Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-layout">

    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-text">DZ<em>Admin</em></div>
            <small>Panel de control</small>
        </div>
        <nav class="sidebar-menu">
            <div class="menu-label">Catálogo</div>
            <a th:href="@{/admin/productos}" class="menu-item active">
                <span class="icon">◫</span> Productos
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="/"><span>↩</span> Cerrar sesión</a>
        </div>
    </aside>

    <div class="main-content">

        <header class="topbar">
            <div class="topbar-left">
                <h1>Editar Producto <span class="edit-badge">Editando</span></h1>
            </div>
            <div class="topbar-right">
                <a th:href="@{/admin/productos}" class="btn btn-ghost">← Volver</a>
            </div>
        </header>

        <main class="content">
            <form th:action="@{/admin/productos/actualizar}"
                  th:object="${producto}"
                  method="post">

                <!-- Campo oculto con el ID para saber qué producto actualizar -->
                <input type="hidden" th:field="*{id}">

                <div class="form-card">
                    <div class="form-header">
                        <h2>Información del producto</h2>
                    </div>
                    <div class="form-body">

                        <div class="field full">
                            <label>Nombre del producto</label>
                            <input type="text" th:field="*{nombre}" placeholder="Nombre del producto">
                            <span class="error-msg" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
                        </div>

                        <div class="field">
                            <label>Categoría</label>
                            <select th:field="*{categoria}">
                                <option value="Gorras">Gorras</option>
                                <option value="Ropa">Ropa</option>
                                <option value="Accesorios">Accesorios</option>
                                <option value="Calzado">Calzado</option>
                            </select>
                            <span class="error-msg" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></span>
                        </div>

                        <div class="field">
                            <label>Precio (COP)</label>
                            <input type="number" th:field="*{precio}" min="0">
                            <span class="error-msg" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></span>
                        </div>

                        <div class="field">
                            <label>Stock disponible</label>
                            <input type="number" th:field="*{stock}" min="0">
                            <span class="error-msg" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></span>
                        </div>

                        <div class="field">
                            <label>SKU</label>
                            <input type="text" th:field="*{sku}" placeholder="SKU-001">
                        </div>

                        <div class="field full">
                            <label>Descripción</label>
                            <textarea th:field="*{descripcion}" placeholder="Descripción del producto..."></textarea>
                        </div>

                    </div>
                    <div class="form-footer">
                        <a th:href="@{/admin/productos}" class="btn btn-ghost">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar cambios →</button>
                    </div>
                </div>

            </form>
        </main>
    </div>
</div>
</body>
</html>
