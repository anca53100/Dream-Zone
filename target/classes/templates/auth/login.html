<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Dream Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">

<div class="auth-wrapper">

    <div class="auth-banner"></div>

    <div class="auth-card">

        <div class="auth-logo">
            DREAM<br>ZONE
        </div>

        <h2 class="auth-title">Iniciar sesión</h2>
        <p class="auth-subtitle">Bienvenido de nuevo a Dream Zone</p>

        <div th:if="${error}" class="auth-alert auth-alert-error">
            <span th:text="${error}"></span>
        </div>

        <div th:if="${param.registrado}" class="auth-alert auth-alert-success">
            ¡Cuenta creada exitosamente! Ya puedes iniciar sesión.
        </div>

        <form th:action="@{/auth/login}" method="post">

            <div class="auth-field">
                <label for="email">Correo electrónico</label>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="tu@email.com"
                       required
                       class="auth-input">
            </div>

            <div class="auth-field">
                <label for="password">Contraseña</label>
                <div class="input-password-wrapper">
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="••••••••"
                           required
                           class="auth-input">
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        &#128065;
                    </button>
                </div>
                <a th:href="@{/auth/recuperar}" class="auth-link-small">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-auth-primary">Iniciar sesión</button>

        </form>

        <p class="auth-footer-text">
            ¿No tienes cuenta?
            <a th:href="@{/auth/register}" class="auth-link">Regístrate</a>
        </p>

    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('password');
        input.type = input.type === 'password' ? 'text' : 'password';
    }
</script>

</body>
</html>
