<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tienda — DreamZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-purple: #7c3aed;
            --neon-pink: #f0abfc;
            --dark-bg: #030712;
            --dark-card: #0d1117;
            --dark-surface: #111827;
            --dark-border: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent-glow: rgba(0, 212, 255, 0.15);
            --purple-glow: rgba(124, 58, 237, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 3px; }

        /* ─── SIDEBAR NAV ─── */
        .nav-sidebar {
            position: fixed; left: 0; top: 0; bottom: 0;
            width: 220px; background: var(--dark-card);
            border-right: 1px solid var(--dark-border);
            display: flex; flex-direction: column;
            z-index: 100; padding: 24px 0;
        }
        .logo { padding: 0 20px 24px; border-bottom: 1px solid var(--dark-border); }
        .logo-text {
            font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 900;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        .logo-sub { font-size: 10px; color: var(--text-secondary); letter-spacing: 1px; margin-top: 2px; }
        .nav-section { padding: 16px 0; }
        .nav-label { font-size: 10px; letter-spacing: 2px; color: var(--text-secondary); padding: 0 20px 8px; text-transform: uppercase; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 20px; cursor: pointer; transition: all 0.2s;
            font-size: 15px; font-weight: 500; color: var(--text-secondary);
            text-decoration: none; position: relative;
        }
        .nav-item:hover, .nav-item.active { color: var(--text-primary); background: var(--accent-glow); }
        .nav-item.active::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 3px; background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue);
        }
        .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
        .nav-badge { margin-left: auto; background: var(--neon-purple); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
        .sidebar-bottom { margin-top: auto; border-top: 1px solid var(--dark-border); padding-top: 16px; }

        /* ─── TOPBAR ─── */
        .topbar {
            position: fixed; top: 0; left: 220px; right: 0; height: 64px;
            background: rgba(3, 7, 18, 0.95); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--dark-border);
            display: flex; align-items: center; padding: 0 32px; gap: 16px;
            z-index: 99;
        }
        .hamburger { display: none; background: none; border: none; color: var(--text-primary); cursor: pointer; }
        .search-bar {
            flex: 1; max-width: 480px;
            display: flex; align-items: center; gap: 10px;
            background: var(--dark-surface); border: 1px solid var(--dark-border);
            border-radius: 8px; padding: 8px 16px; transition: border-color 0.2s;
        }
        .search-bar:focus-within { border-color: var(--neon-blue); box-shadow: 0 0 0 3px var(--accent-glow); }
        .search-bar svg { color: var(--text-secondary); width: 16px; height: 16px; flex-shrink: 0; }
        .search-bar input { background: none; border: none; outline: none; color: var(--text-primary); font-family: 'Rajdhani', sans-serif; font-size: 14px; width: 100%; }
        .search-bar input::placeholder { color: var(--text-secondary); }
        .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
        .icon-btn {
            width: 40px; height: 40px; border-radius: 8px;
            background: var(--dark-surface); border: 1px solid var(--dark-border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; color: var(--text-secondary);
            text-decoration: none; position: relative;
        }
        .icon-btn:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
        .icon-btn svg { width: 18px; height: 18px; }
        .cart-count {
            position: absolute; top: -4px; right: -4px;
            width: 16px; height: 16px; background: var(--neon-purple);
            border-radius: 50%; font-size: 10px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; color: white;
        }
        .avatar {
            width: 40px; height: 40px; border-radius: 8px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 700; cursor: pointer;
        }

        /* ─── LAYOUT ─── */
        .page-wrapper {
            margin-left: 220px; margin-top: 64px;
            display: flex; min-height: calc(100vh - 64px);
        }

        .inicio { flex: 1; padding: 28px 32px; overflow-y: auto; }

        /* ─── FILTER SIDEBAR ─── */
        .filter-sidebar {
            position: fixed; left: 220px; top: 64px; bottom: 0;
            width: 240px; flex-shrink: 0; z-index: 50;
            background: var(--dark-card); border-right: 1px solid var(--dark-border);
            padding: 24px 0; overflow-y: auto;
        }
        .filter-header {
            padding: 0 20px 16px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--dark-border); margin-bottom: 8px;
        }
        .filter-title { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700; letter-spacing: 1px; }
        .filter-reset { font-size: 12px; color: var(--neon-blue); cursor: pointer; text-decoration: none; }
        .filter-reset:hover { text-decoration: underline; }

        .filter-group { padding: 16px 20px; border-bottom: 1px solid var(--dark-border); }
        .filter-group-title {
            font-size: 11px; letter-spacing: 2px; color: var(--text-secondary);
            text-transform: uppercase; margin-bottom: 12px; display: flex;
            align-items: center; justify-content: space-between; cursor: pointer;
        }
        .filter-group-title svg { width: 14px; height: 14px; transition: transform 0.2s; }
        .filter-group-title.collapsed svg { transform: rotate(-90deg); }

        .filter-options { display: flex; flex-direction: column; gap: 8px; }
        .filter-option {
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; padding: 4px 0; transition: color 0.15s;
        }
        .filter-option:hover .filter-label { color: var(--text-primary); }
        .filter-checkbox {
            width: 16px; height: 16px; border: 1px solid var(--dark-border);
            border-radius: 4px; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; transition: all 0.15s; background: var(--dark-surface);
        }
        .filter-option input { display: none; }
        .filter-option input:checked + .filter-checkbox {
            background: var(--neon-blue); border-color: var(--neon-blue);
        }
        .filter-option input:checked + .filter-checkbox::after {
            content: '✓'; font-size: 10px; color: var(--dark-bg); font-weight: 900;
        }
        .filter-label { font-size: 14px; color: var(--text-secondary); flex: 1; }
        .filter-count { font-size: 11px; color: var(--text-secondary); }

        /* Price range */
        .price-inputs { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
        .price-input {
            flex: 1; background: var(--dark-surface); border: 1px solid var(--dark-border);
            border-radius: 6px; padding: 6px 10px; color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif; font-size: 13px; outline: none;
            transition: border-color 0.2s;
        }
        .price-input:focus { border-color: var(--neon-blue); }
        .price-sep { color: var(--text-secondary); font-size: 12px; }

        .range-slider {
            width: 100%; -webkit-appearance: none; height: 4px;
            background: linear-gradient(to right, var(--neon-blue) 0%, var(--neon-blue) 60%, var(--dark-border) 60%);
            border-radius: 2px; outline: none; margin-top: 12px;
        }
        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            border-radius: 50%; background: var(--neon-blue);
            box-shadow: 0 0 8px rgba(0,212,255,0.5); cursor: pointer;
        }

        /* ─── MAIN CONTENT ─── */
        .main-content { flex: 1; padding: 28px 32px; overflow-y: auto; margin-left: 240px; }

        /* Breadcrumb */
        .breadcrumb {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-secondary); margin-bottom: 20px;
        }
        .breadcrumb a { color: var(--text-secondary); text-decoration: none; transition: color 0.15s; }
        .breadcrumb a:hover { color: var(--neon-blue); }
        .breadcrumb-sep { color: var(--dark-border); }
        .breadcrumb-current { color: var(--text-primary); }

        /* Tienda header */
        .tienda-header { margin-bottom: 24px; }
        .tienda-title { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 900; margin-bottom: 4px; }
        .tienda-sub { font-size: 14px; color: var(--text-secondary); }

        /* Toolbar */
        .toolbar {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 24px; flex-wrap: wrap;
        }
        .toolbar-left { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }
        .toolbar-right { display: flex; align-items: center; gap: 8px; }

        .filter-tag {
            display: flex; align-items: center; gap: 6px;
            background: var(--accent-glow); border: 1px solid rgba(0,212,255,0.3);
            border-radius: 6px; padding: 5px 10px; font-size: 12px; color: var(--neon-blue);
            cursor: pointer; transition: all 0.15s;
        }
        .filter-tag:hover { background: rgba(0,212,255,0.2); }
        .filter-tag-x { color: var(--text-secondary); font-size: 14px; line-height: 1; }

        .sort-select {
            background: var(--dark-surface); border: 1px solid var(--dark-border);
            color: var(--text-primary); font-family: 'Rajdhani', sans-serif; font-size: 14px;
            padding: 8px 12px; border-radius: 8px; outline: none; cursor: pointer;
        }
        .sort-select:focus { border-color: var(--neon-blue); }

        .results-count { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
        .results-count strong { color: var(--text-primary); }

        /* ─── PRODUCT GRID ─── */
        .products-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
            margin-bottom: 32px;
        }
        .product-card {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            border-radius: 12px; overflow: hidden; cursor: pointer;
            transition: all 0.25s; position: relative;
            animation: fade-in 0.4s ease forwards; opacity: 0;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .product-card:hover {
            border-color: rgba(0, 212, 255, 0.4); transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 212, 255, 0.08);
        }
        .product-card:hover .product-actions { opacity: 1; transform: translateY(0); }

        .product-img {
            aspect-ratio: 1; background: var(--dark-surface);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .product-img-inner {
            width: 65%; height: 65%; border-radius: 8px;
            background: linear-gradient(135deg, var(--dark-border), rgba(31,41,55,0.5));
            display: flex; align-items: center; justify-content: center; font-size: 40px;
        }
        .product-badge {
            position: absolute; top: 10px; left: 10px;
            padding: 3px 8px; border-radius: 4px;
            font-size: 10px; font-weight: 700; letter-spacing: 1px;
        }
        .badge-new { background: var(--neon-blue); color: var(--dark-bg); }
        .product-actions {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 12px;
            display: flex; gap: 8px; opacity: 0; transform: translateY(8px);
            transition: all 0.2s;
            background: linear-gradient(to top, rgba(3,7,18,0.97), transparent);
        }
        .add-cart-btn {
            flex: 1; background: var(--neon-blue); color: var(--dark-bg);
            border: none; border-radius: 6px; padding: 8px;
            font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700;
            cursor: pointer; letter-spacing: 0.5px; transition: all 0.15s;
        }
        .add-cart-btn:hover { background: #33ddff; }
        .add-cart-btn:disabled { background: var(--dark-surface); color: var(--text-secondary); cursor: not-allowed; }

        .product-info { padding: 14px; }
        .product-series { font-size: 11px; color: var(--neon-blue); letter-spacing: 1px; text-transform: uppercase; }
        .product-name { font-size: 14px; font-weight: 600; margin: 4px 0 8px; color: var(--text-primary); line-height: 1.3; }
        .product-meta { display: flex; align-items: center; justify-content: space-between; }
        .product-price { display: flex; align-items: baseline; gap: 6px; }
        .price-current { font-size: 18px; font-weight: 700; color: var(--neon-blue); font-family: 'Orbitron', monospace; }
        .price-old { font-size: 12px; color: var(--text-secondary); text-decoration: line-through; }
        .product-stock { font-size: 11px; }
        .stock-ok { color: #34d399; }
        .stock-low { color: #fbbf24; }
        .stock-out { color: #f87171; }

        /* ─── PAGINATION ─── */
        .pagination {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            margin-top: 8px; padding-bottom: 32px;
        }
        .page-btn {
            width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--dark-border);
            background: var(--dark-card); color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 14px;
            font-weight: 600; transition: all 0.15s; text-decoration: none;
        }
        .page-btn:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
        .page-btn.active { background: var(--neon-blue); border-color: var(--neon-blue); color: var(--dark-bg); font-weight: 700; }
        .page-btn.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        .page-dots { color: var(--text-secondary); font-size: 14px; padding: 0 4px; }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            text-align: center; padding: 80px 32px;
            display: none;
        }
        .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
        .empty-title { font-family: 'Orbitron', monospace; font-size: 18px; margin-bottom: 8px; }
        .empty-sub { color: var(--text-secondary); font-size: 15px; }

        /* ─── MOBILE ─── */
        @media (max-width: 1100px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 900px) {
            .nav-sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .nav-sidebar.open { transform: translateX(0); }
            .page-wrapper { margin-left: 0; }
            .topbar { left: 0; }
            .hamburger { display: block; }
            .filter-sidebar { display: none; }
            .filter-sidebar.open { display: block; position: fixed; z-index: 98; top: 64px; left: 0; bottom: 0; }
            .main-content { margin-left: 0; }
            .products-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 540px) {
            .products-grid { grid-template-columns: 1fr; }
            .main-content { padding: 20px 16px; }
        }
    </style>
</head>

<!-- ─── PAGE WRAPPER ─── -->
<div class="page-wrapper">

    <!-- FILTER SIDEBAR -->
    <aside class="filter-sidebar" id="filterSidebar">
        <div class="filter-header">
            <span class="filter-title">FILTROS</span>
            <a href="#" class="filter-reset" onclick="resetFilters()">Limpiar todo</a>
        </div>

        <!-- Categorías -->
        <div class="filter-group">
            <div class="filter-group-title" onclick="toggleGroup(this)">
                Categorías
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
            <div class="filter-options">
                <label class="filter-option">
                    <input type="checkbox" data-type="cat" value="Camisas Importadas" onchange="filterProducts()"/>
                    <div class="filter-checkbox"></div>
                    <span class="filter-label">👔 Camisas Importadas</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" data-type="cat" value="Camisas Nacionales" onchange="filterProducts()"/>
                    <div class="filter-checkbox"></div>
                    <span class="filter-label">🌿 Camisas Nacionales</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" data-type="cat" value="Gorras" onchange="filterProducts()"/>
                    <div class="filter-checkbox"></div>
                    <span class="filter-label">🧢 Gorras</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" data-type="cat" value="Tulas" onchange="filterProducts()"/>
                    <div class="filter-checkbox"></div>
                    <span class="filter-label">🎒 Tulas</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" data-type="cat" value="Medias" onchange="filterProducts()"/>
                    <div class="filter-checkbox"></div>
                    <span class="filter-label">🧦 Medias</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" data-type="cat" value="Billeteras" onchange="filterProducts()"/>
                    <div class="filter-checkbox"></div>
                    <span class="filter-label">👛 Billeteras</span>
                </label>
            </div>
        </div>

        <!-- Colecciones -->
        <div class="filter-group">
            <div class="filter-group-title" onclick="toggleGroup(this)">
                Colecciones
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
            <div class="filter-options">
                <label class="filter-option">
                    <input type="checkbox" data-type="serie" value="Death Note" onchange="filterProducts()"/>
                    <div class="filter-checkbox"></div>
                    <span class="filter-label">📓 Death Note</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" data-type="serie" value="One Piece" onchange="filterProducts()"/>
                    <div class="filter-checkbox"></div>
                    <span class="filter-label">⚓ One Piece</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" data-type="serie" value="Naruto" onchange="filterProducts()"/>
                    <div class="filter-checkbox"></div>
                    <span class="filter-label">🍃 Naruto</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" data-type="serie" value="Demon Slayer" onchange="filterProducts()"/>
                    <div class="filter-checkbox"></div>
                    <span class="filter-label">⚔️ Demon Slayer</span>
                </label>
            </div>
        </div>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <!-- Header -->
        <div class="tienda-header">
            <h1 class="tienda-title">Tienda</h1>
            <p class="tienda-sub">Explora nuestro catálogo completo</p>
        </div>
        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-right">
                <select class="sort-select" onchange="sortProducts(this.value)">
                    <option value="reciente">Más recientes</option>
                    <option value="precio-asc">Precio: menor a mayor</option>
                    <option value="precio-desc">Precio: mayor a menor</option>
                    <option value="nombre">Nombre A–Z</option>
                </select>
            </div>
        </div>
        <!-- Products -->
        <div class="products-grid" id="productsGrid">

            <a class="product-card" th:href="@{/tienda/{id}(id=${producto.id})}"
               style="text-decoration:none;"
               th:each="producto : ${productos}"
               th:data-name="${producto.nombre}"
               th:data-cat="${producto.categoria}"
               th:data-serie="${producto.serie}"
               th:data-precio="${producto.precio}"
               th:data-stock="${producto.stock}">

                <!-- Imagen -->
                <div class="product-img">

                    <img th:if="${producto.imagen != null and !producto.imagen.isEmpty()}"
                         th:src="${producto.imagen}"
                         alt="Producto"
                         style="width:100%; height:100%; object-fit:cover;"/>

                    <div class="product-img-inner"
                         th:if="${producto.imagen == null or producto.imagen.isEmpty()}">
                        📦
                    </div>

                </div>

                <!-- Info -->
                <div class="product-info">

                    <div class="product-series"
                         th:text="${producto.categoria}">
                        Categoría
                    </div>

                    <div class="product-name"
                         th:text="${producto.nombre}">
                        Nombre
                    </div>

                    <div class="product-meta">
                        <div class="product-price">
                            <span class="price-current"
                                  th:text="'$' + ${#numbers.formatDecimal(producto.precio, 0, 'POINT', 0, 'POINT')}">
                                $80.000
                            </span>
                        </div>

                        <span class="product-stock stock-ok"
                              th:if="${producto.stock > 0}"
                              th:text="'● ' + ${producto.stock} + ' disponibles'">
                        </span>

                        <span class="product-stock stock-out"
                              th:if="${producto.stock <= 0}">
                            ● Agotado
                        </span>
                    </div>
                </div>
            </a>
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState">
            <div class="empty-icon"></div>
            <div class="empty-title">Sin resultados</div>
            <div class="empty-sub">Intenta con otros filtros o términos de búsqueda</div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </main>
</div>

<script>
    const PRODUCTS_PER_PAGE = 6;

    let currentPage = 1;

    // ───────── SIDEBAR MOBILE ─────────
    function toggleNav() {
        document.getElementById('navSidebar').classList.toggle('open');
    }

    // ───────── ABRIR / CERRAR FILTRO ─────────
    function toggleGroup(el) {

        el.classList.toggle('collapsed');

        const options = el.nextElementSibling;

        if (options) {

            options.style.display =
                el.classList.contains('collapsed')
                    ? 'none'
                    : 'flex';
        }
    }

    // ───────── FILTRO POR CATEGORÍA Y COLECCIÓN ─────────
    function filterProducts() {

        const searchText =
            document.getElementById('searchInput')
                .value.trim().toLowerCase();

        const selectedCategories =
            Array.from(document.querySelectorAll('input[data-type="cat"]:checked'))
                .map(cb => cb.value.trim().toLowerCase());

        const selectedCollections =
            Array.from(document.querySelectorAll('input[data-type="serie"]:checked'))
                .map(cb => cb.value.trim().toLowerCase());

        const cards = document.querySelectorAll('.product-card');
        let visibles = 0;

        cards.forEach(card => {
            const category = (card.dataset.cat   || '').trim().toLowerCase();
            const serie    = (card.dataset.serie  || '').trim().toLowerCase();
            const name     = (card.dataset.name   || '').trim().toLowerCase();

            const matchCategory   = selectedCategories.length  === 0 || selectedCategories.includes(category);
            const matchCollection = selectedCollections.length === 0 || selectedCollections.includes(serie);
            const matchSearch     = name.includes(searchText);

            const show = matchCategory && matchCollection && matchSearch;
            card.style.display = show ? 'block' : 'none';
            if (show) visibles++;
        });

        document.getElementById('emptyState').style.display =
            visibles === 0 ? 'block' : 'none';
    }

    // ───────── LIMPIAR FILTROS ─────────
    function resetFilters() {
        document.querySelectorAll('.filter-option input').forEach(cb => cb.checked = false);
        filterProducts();
        return false;
    }

    // ───────── ORDENAR PRODUCTOS ─────────
    function sortProducts(val) {

        const grid =
            document.getElementById('productsGrid');

        const cards =
            Array.from(
                grid.querySelectorAll('.product-card')
            );

        cards.sort((a, b) => {

            if (val === 'precio-asc') {

                return parseInt(a.dataset.precio)
                    - parseInt(b.dataset.precio);
            }

            if (val === 'precio-desc') {

                return parseInt(b.dataset.precio)
                    - parseInt(a.dataset.precio);
            }

            if (val === 'nombre') {

                return (a.dataset.name || '')
                    .localeCompare(b.dataset.name || '');
            }

            return 0;
        });

        cards.forEach(card => grid.appendChild(card));
    }

    // ───────── PRE-SELECCIONAR FILTROS DESDE URL ─────────
    (function initFilters() {
        const params = new URLSearchParams(window.location.search);
        const catParam       = params.get('cat');
        const coleccionParam = params.get('coleccion');

        if (catParam) {
            document.querySelectorAll('input[data-type="cat"]').forEach(cb => {
                if (cb.value.toLowerCase() === catParam.toLowerCase()) cb.checked = true;
            });
        }
        if (coleccionParam) {
            document.querySelectorAll('input[data-type="serie"]').forEach(cb => {
                if (cb.value.toLowerCase() === coleccionParam.toLowerCase()) cb.checked = true;
            });
        }

        filterProducts();
    })();

</script>

</body>
</html>
