<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta - Dream Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">

<div class="auth-wrapper">

    <div class="auth-banner">
        <img src="/images/login/login.png" alt="Dream Zone" style="width:100%;height:100%;object-fit:cover;display:block;">
    </div>

    <div class="auth-card">

        <div class="auth-logo">
            DREAM<br>ZONE
        </div>

        <h2 class="auth-title">Crear cuenta</h2>
        <p class="auth-subtitle">Únete a Dream Zone</p>

        <div th:if="${error}" class="auth-alert auth-alert-error">
            <span th:text="${error}"></span>
        </div>

        <form method="post" action="/auth/register">

            <div class="auth-field">
                <label for="nombre">Nombre completo</label>
                <input type="text"
                       id="nombre"
                       name="nombre"
                       placeholder="Tu nombre completo"
                       required
                       class="auth-input">
            </div>

            <div class="auth-field">
                <label for="email">Correo electrónico</label>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="correo@ejemplo.com"
                       required
                       class="auth-input">
            </div>

            <div class="auth-field">
                <label for="password">Contraseña</label>
                <div class="input-password-wrapper">
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Mínimo 8 caracteres y un número"
                           required
                           class="auth-input">
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">&#128065;</button>
                </div>
            </div>

            <div class="auth-field">
                <label for="password2">Confirmar contraseña</label>
                <div class="input-password-wrapper">
                    <input type="password"
                           id="password2"
                           name="password2"
                           placeholder="Repite la contraseña"
                           required
                           class="auth-input">
                    <button type="button" class="toggle-password" onclick="togglePassword('password2')">&#128065;</button>
                </div>
            </div>

            <button type="submit" class="btn-auth-primary">Crear cuenta</button>

        </form>

        <p class="auth-footer-text" style="margin-top:40px;">
            ¿Ya tienes cuenta?
            <a href="/auth/login" class="auth-link">Inicia sesión</a>
        </p>

    </div>
</div>

<script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    document.querySelector('form').addEventListener('submit', function(e) {
        const pass = document.getElementById('password').value;
        const pass2 = document.getElementById('password2').value;

        if (pass.length < 8) {
            e.preventDefault();
            alert('La contraseña debe tener mínimo 8 caracteres');
            return;
        }

        if (!/\d/.test(pass)) {
            e.preventDefault();
            alert('La contraseña debe contener al menos un número');
            return;
        }

        if (pass !== pass2) {
            e.preventDefault();
            alert('Las contraseñas no coinciden');
        }
    });
</script>

</body>
</html>
