<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Dream Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">

<div class="auth-wrapper">

    <!-- Panel izquierdo vacío decorativo -->
    <div class="auth-banner"></div>

    <!-- Panel derecho: formulario -->
    <div class="auth-card">

        <div class="auth-logo">
            DREAM<br>ZONE
        </div>

        <h2 class="auth-title">Iniciar sesión</h2>
        <p class="auth-subtitle">Bienvenido de nuevo a Dream Zone</p>

        <!-- Mensaje de error -->
        <div th:if="${error}" class="auth-alert auth-alert-error">
            <span th:text="${error}"></span>
        </div>

        <!-- Mensaje de registro exitoso -->
        <div th:if="${param.registrado}" class="auth-alert auth-alert-success">
            ¡Cuenta creada exitosamente! Ya puedes iniciar sesión.
        </div>

        <form th:action="@{/auth/login}" method="post">

            <div class="auth-field">
                <label for="email">Correo electrónico</label>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="tu@email.com"
                       required
                       class="auth-input">
            </div>

            <div class="auth-field">
                <label for="contrasena">Contraseña</label>
                <div class="input-password-wrapper">
                    <input type="password"
                           id="contrasena"
                           name="password"
                           placeholder="••••••••"
                           required
                           class="auth-input">
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        &#128065;
                    </button>
                </div>
                <a th:href="@{/auth/recuperar}" class="auth-link-small">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-auth-primary">Iniciar sesión</button>

        </form>

        <div class="auth-divider">
            <span>o continúa con</span>
        </div>

        <div class="auth-social">
            <!-- Google -->
            <button class="btn-social">
                <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
            </button>

            <!-- Discord -->
            <button class="btn-social">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="#5865F2" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
            </button>

            <!-- Twitch -->
            <button class="btn-social">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#9146FF" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/>
                </svg>
            </button>
        </div>

        <p class="auth-footer-text">
            ¿No tienes cuenta?
            <a th:href="@{/auth/register}" class="auth-link">Regístrate</a>
        </p>

    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('contrasena');
        input.type = input.type === 'password' ? 'text' : 'password';
    }
</script>

</body>
</html>
